<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreamento de Resíduos Hospitalares</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#f4f7fb; margin:0 }
.container { padding:20px }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:15px }
button { padding:10px; border:none; border-radius:8px; cursor:pointer }
.btn { background:#0f766e; color:white }
input { padding:10px; width:100%; margin:5px 0 }
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Criar Remessa</h2>

<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="material" placeholder="Material">
<input id="volumes" type="number" placeholder="Quantidade">

<button class="btn" onclick="criarRemessa()">Criar</button>
</div>

<div class="card">
<h2>Saída</h2>
<input id="codigoSaida" placeholder="Código">
<button class="btn" onclick="registrarSaida()">Registrar Saída</button>
</div>

<div class="card">
<h2>Chegada</h2>
<input id="codigoChegada" placeholder="Código">
<button class="btn" onclick="registrarChegada()">Registrar Chegada</button>
</div>

<div class="card">
<h2>Status</h2>
<div id="status"></div>
</div>

</div>

<script type="module">

// 🔥 FIREBASE CONFIG
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcG7UwJS7Fchdhfv7SbgP59AXWlwkmWwE",
  authDomain: "rastreamento-saude.firebaseapp.com",
  projectId: "rastreamento-saude",
  storageBucket: "rastreamento-saude.firebasestorage.app",
  messagingSenderId: "630037928416",
  appId: "1:630037928416:web:616ef55c9e1ca251507385"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 CRIAR REMESSA
window.criarRemessa = async function() {

let origem = document.getElementById("origem").value;
let destino = document.getElementById("destino").value;
let material = document.getElementById("material").value;
let qtd = parseInt(document.getElementById("volumes").value);

let remessa = "REM-" + Date.now();

for(let i=1;i<=qtd;i++){

let codigo = remessa + "-VOL-" + String(i).padStart(2,"0");

await addDoc(collection(db, "volumes"), {
codigo,
origem,
destino,
material,
status:"AGUARDANDO",
dataCriacao:new Date().toLocaleString()
});

}

alert("Remessa criada com sucesso!");
}

// 🔵 SAÍDA
window.registrarSaida = async function(){

let codigo = document.getElementById("codigoSaida").value;

let query = await getDocs(collection(db,"volumes"));

query.forEach(async (item)=>{
if(item.data().codigo === codigo){

await updateDoc(doc(db,"volumes",item.id),{
status:"EM TRANSPORTE",
saida:new Date().toLocaleString()
});

alert("Saída registrada!");
}
});

}

// 🟣 CHEGADA
window.registrarChegada = async function(){

let codigo = document.getElementById("codigoChegada").value;

let query = await getDocs(collection(db,"volumes"));

query.forEach(async (item)=>{
if(item.data().codigo === codigo){

await updateDoc(doc(db,"volumes",item.id),{
status:"ENTREGUE",
chegada:new Date().toLocaleString()
});

alert("Chegada registrada!");
}
});

}

// 🔥 ATUALIZA STATUS EM TEMPO REAL
async function carregar(){

let lista = document.getElementById("status");
lista.innerHTML="";

let query = await getDocs(collection(db,"volumes"));

query.forEach(item=>{
let d = item.data();

lista.innerHTML += `
<p>
${d.codigo} - ${d.status}
</p>
`;
});

}

setInterval(carregar,2000);

</script>

</body>
</html>
