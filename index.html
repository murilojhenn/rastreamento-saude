<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreamento Hospitalar</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:Arial;background:#f4f7fb;margin:0}
.container{padding:20px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px}
button{padding:10px;border:none;border-radius:8px;cursor:pointer}
.btn{background:#0f766e;color:#fff}
input,select{padding:10px;width:100%;margin:5px 0}
.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>Login</h2>
<select id="usuario">
<option value="admin">Admin</option>
<option value="saida">Saída</option>
<option value="chegada">Chegada</option>
</select>
<input id="senha" placeholder="Senha">
<button class="btn" onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="adminArea" class="hidden">

<div class="card">
<h2>Criar Remessa</h2>
<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="cidade" placeholder="Cidade">
<input id="material" placeholder="Material">
<input id="responsavel" placeholder="Responsável">
<input id="volumes" type="number" placeholder="Quantidade">
<button class="btn" onclick="criarRemessa()">Criar</button>
</div>

<div class="card">
<h2>Etiquetas</h2>
<div id="etiquetas"></div>
</div>

</div>

<!-- SAIDA -->
<div id="saidaArea" class="hidden">
<div class="card">
<h2>Registrar Saída</h2>
<input id="codigoSaida" placeholder="Código manual">
<button class="btn" onclick="saidaManual()">Manual</button>
<div id="readerSaida"></div>
<button onclick="lerSaida()">Ler QR</button>
</div>
</div>

<!-- CHEGADA -->
<div id="chegadaArea" class="hidden">
<div class="card">
<h2>Registrar Chegada</h2>
<input id="codigoChegada" placeholder="Código manual">
<button class="btn" onclick="chegadaManual()">Manual</button>
<div id="readerChegada"></div>
<button onclick="lerChegada()">Ler QR</button>
</div>
</div>

<!-- STATUS -->
<div class="card">
<h2>Status</h2>
<div id="status"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcG7UwJS7Fchdhfv7SbgP59AXWlwkmWwE",
  authDomain: "rastreamento-saude.firebaseapp.com",
  projectId: "rastreamento-saude",
  storageBucket: "rastreamento-saude.firebasestorage.app",
  messagingSenderId: "630037928416",
  appId: "1:630037928416:web:616ef55c9e1ca251507385"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOGIN SIMPLES
window.login = function(){
let user = document.getElementById("usuario").value;

document.getElementById("loginBox").classList.add("hidden");

if(user==="admin") document.getElementById("adminArea").classList.remove("hidden");
if(user==="saida") document.getElementById("saidaArea").classList.remove("hidden");
if(user==="chegada") document.getElementById("chegadaArea").classList.remove("hidden");
}

// CRIAR REMESSA
window.criarRemessa = async function(){

let origem = origemInput.value;
let destino = destinoInput.value;
let cidade = cidadeInput.value;
let material = materialInput.value;
let responsavel = responsavelInput.value;
let qtd = parseInt(volumesInput.value);

let remessa = "REM-"+Date.now();

let etiquetas = document.getElementById("etiquetas");
etiquetas.innerHTML="";

for(let i=1;i<=qtd;i++){

let codigo = remessa+"-VOL-"+String(i).padStart(2,"0");

await addDoc(collection(db,"volumes"),{
codigo,origem,destino,cidade,material,responsavel,
status:"AGUARDANDO",
saida:null,
chegada:null
});

let div = document.createElement("div");
div.innerHTML = `<b>${codigo}</b><br><canvas id="${codigo}"></canvas>`;
etiquetas.appendChild(div);

QRCode.toCanvas(document.getElementById(codigo), codigo);

}

alert("Remessa criada!");
}

// SAIDA
async function registrarSaida(codigo){

let query = await getDocs(collection(db,"volumes"));

query.forEach(async (item)=>{
if(item.data().codigo === codigo){

await updateDoc(doc(db,"volumes",item.id),{
status:"EM TRANSPORTE",
saida:Date.now()
});

}
});
}

window.saidaManual = ()=> registrarSaida(codigoSaida.value);

// CHEGADA
async function registrarChegada(codigo){

let query = await getDocs(collection(db,"volumes"));

query.forEach(async (item)=>{
if(item.data().codigo === codigo){

let tempo = Date.now() - item.data().saida;

await updateDoc(doc(db,"volumes",item.id),{
status:"ENTREGUE",
chegada:Date.now(),
tempo
});

}
});
}

window.chegadaManual = ()=> registrarChegada(codigoChegada.value);

// QR SCAN
window.lerSaida = ()=>{
new Html5Qrcode("readerSaida").start(
{ facingMode: "environment" },
{},
(codigo)=> registrarSaida(codigo)
);
}

window.lerChegada = ()=>{
new Html5Qrcode("readerChegada").start(
{ facingMode: "environment" },
{},
(codigo)=> registrarChegada(codigo)
);
}

// STATUS
async function carregar(){

let lista = document.getElementById("status");
lista.innerHTML="";

let query = await getDocs(collection(db,"volumes"));

query.forEach(item=>{
let d = item.data();

lista.innerHTML += `
<p>
${d.codigo} - ${d.status} 
${d.tempo ? "- Tempo: "+Math.round(d.tempo/1000)+"s":""}
</p>
`;
});

}

setInterval(carregar,2000);

</script>

</body>
</html>
